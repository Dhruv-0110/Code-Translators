services:
  db:
    image: docker.io/library/postgres:16
    network_mode: host
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    network_mode: host
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PRISMA_CLIENT_ENGINE_TYPE=${PRISMA_CLIENT_ENGINE_TYPE}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --skip-generate && npx tsx watch src/index.ts"

  frontend:
    build: ./client
    network_mode: host
    depends_on:
      - backend
